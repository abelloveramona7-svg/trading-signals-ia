<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Signals IA - Análise de Sinais</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #050816; color: #f5f5f5; }
        .navbar { background: #0b1020; border-bottom: 1px solid #222; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: bold; color: #00ff00; }
        .credits { background: #00ff00; color: #000; padding: 6px 16px; border-radius: 20px; font-weight: bold; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px 16px; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
        .card { background: #111827; border: 1px solid #374151; border-radius: 12px; padding: 20px; }
        .card-value { font-size: 32px; font-weight: bold; color: #00ff00; margin: 12px 0; }
        .card-label { font-size: 12px; color: #9ca3af; text-transform: uppercase; }
        .section { background: #111827; border: 1px solid #374151; border-radius: 12px; padding: 24px; margin-bottom: 32px; }
        .section h2 { margin-bottom: 20px; color: #00ff00; }
        .form-group { margin-bottom: 16px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #374151; border-radius: 8px; background: #020617; color: #f5f5f5; font-size: 14px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #00ff00; color: #000; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 16px; }
        .btn:hover { background: #00dd00; }
        .chart { margin: 24px 0; height: 400px; background: #020617; border-radius: 8px; border: 1px solid #374151; display: flex; align-items: center; justify-content: center; }
        .results { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 24px; }
        .result-card { background: #1f2937; border-left: 4px solid #00ff00; padding: 16px; border-radius: 8px; }
        .result-card h3 { font-size: 12px; color: #9ca3af; margin-bottom: 8px; text-transform: uppercase; }
        .result-card .value { font-size: 24px; font-weight: bold; color: #00ff00; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🤖 Trading Signals IA</div>
        <div class="credits">3 Créditos</div>
    </div>

    <div class="container">
        <div class="dashboard">
            <div class="card">
                <div class="card-label">Total Operado</div>
                <div class="card-value">R$ 0</div>
            </div>
            <div class="card">
                <div class="card-label">Taxa de Acerto</div>
                <div class="card-value">0%</div>
            </div>
            <div class="card">
                <div class="card-label">Líquido (R$)</div>
                <div class="card-value">R$ 0</div>
            </div>
        </div>

        <div class="section">
            <h2>📊 Sinal de Trading IA</h2>
            <p>Selecione o ativo e o tempo gráfico para receber a análise ao vivo.</p>

            <div class="form-group">
                <label>PAR DE MOEDAS / ATIVO</label>
                <select id="asset">
                    <option>EUR/USD (Euro / Dólar Americano)</option>
                    <option>BTC/USD (Bitcoin)</option>
                    <option>GBP/USD (Libra / Dólar)</option>
                    <option>JPY/USD (Iene)</option>
                </select>
            </div>

            <div class="form-group">
                <label>TEMPO GRÁFICO</label>
                <select id="timeframe">
                    <option>5 Minutos</option>
                    <option>15 Minutos</option>
                    <option>1 Hora</option>
                    <option>4 Horas</option>
                    <option>1 Dia</option>
                </select>
            </div>

            <button class="btn" onclick="analisarGrafico()">🤖 Analisar com IA</button>
        </div>

        <div class="section hidden" id="chartSection">
            <h2>Gráfico</h2>
            <div class="chart">
                <canvas id="tradingChart"></canvas>
            </div>

            <div class="results">
                <div class="result-card">
                    <h3>Entrada</h3>
                    <div class="value" id="entrada">1.1705</div>
                </div>
                <div class="result-card">
                    <h3>Take Profit</h3>
                    <div class="value" id="takeProfit">1.1656</div>
                </div>
                <div class="result-card">
                    <h3>Stop Loss</h3>
                    <div class="value" id="stopLoss">1.1728</div>
                </div>
                <div class="result-card">
                    <h3>Risco/Retorno</h3>
                    <div class="value" id="riskReward">1:2.08</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function analisarGrafico() {
            document.getElementById('chartSection').classList.remove('hidden');
            const ctx = document.getElementById('tradingChart').getContext('2d');
            const chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['04:00', '06:00', '08:00', '10:00', '12:00', '14:00', '16:00'],
                    datasets: [{
                        label: 'EUR/USD',
                        data: [1.1710, 1.1705, 1.1690, 1.1680, 1.1685, 1.1705, 1.1700],
                        borderColor: '#00ff00',
                        backgroundColor: 'rgba(0, 255, 0, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: false, grid: { color: '#374151' } } }
                }
            });
        }
    </script>
</body>
</html>
